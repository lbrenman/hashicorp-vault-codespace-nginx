error_log /tmp/nginx-error.log warn;
pid /run/nginx-vault.pid;

events {
  worker_connections 1024;
}

http {
  access_log /tmp/nginx-access.log;

  server {
    listen 8100;

    # Rewrite Fusion's auth path to correct Vault userpass path.
    # Fusion sends:  POST /auth/<mount>/login/<user>
    # Vault expects: POST /v1/auth/userpass/login/<user>
    location ~ ^/auth/[^/]+/login/(.+)$ {
      proxy_pass http://127.0.0.1:8200/v1/auth/userpass/login/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Rewrite Fusion's secret read path to correct Vault KV v2 path.
    # Fusion sends:  GET /root/<path>
    # Vault expects: GET /v1/secret/data/<path>
    location ~ ^/root/(.+)$ {
      proxy_pass http://127.0.0.1:8200/v1/secret/data/$1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # All other requests pass through as-is
    location / {
      proxy_pass http://127.0.0.1:8200;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}

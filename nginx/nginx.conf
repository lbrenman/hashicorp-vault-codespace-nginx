daemon off;
error_log /tmp/nginx-error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  access_log /tmp/nginx-access.log;

  # Cache tokens briefly to avoid a login call on every request
  lua_shared_dict token_cache 10m;

  server {
    listen 8100;

    location / {
      access_by_lua_block {
        local http   = require "resty.http"
        local cache  = ngx.shared.token_cache

        -- Extract Basic Auth header
        local auth_header = ngx.req.get_headers()["Authorization"]
        if not auth_header then
          ngx.status = 401
          ngx.header["WWW-Authenticate"] = 'Basic realm="Vault"'
          ngx.say("Missing Authorization header")
          return ngx.exit(401)
        end

        local encoded = auth_header:match("^Basic%s+(.+)$")
        if not encoded then
          ngx.status = 401
          ngx.say("Invalid Authorization header")
          return ngx.exit(401)
        end

        local decoded = ngx.decode_base64(encoded)
        local username, password = decoded:match("^([^:]+):(.+)$")
        if not username or not password then
          ngx.status = 401
          ngx.say("Invalid credentials format")
          return ngx.exit(401)
        end

        -- Check token cache first
        local cache_key = encoded
        local cached_token = cache:get(cache_key)
        if cached_token then
          ngx.req.set_header("X-Vault-Token", cached_token)
          ngx.req.clear_header("Authorization")
          return
        end

        -- Exchange Basic Auth credentials for a Vault token
        local httpc = http.new()
        local res, err = httpc:request_uri(
          "http://127.0.0.1:8200/v1/auth/userpass/login/" .. username,
          {
            method  = "POST",
            body    = '{"password":"' .. password .. '"}',
            headers = { ["Content-Type"] = "application/json" }
          }
        )

        if not res or res.status ~= 200 then
          ngx.status = 403
          ngx.say("Vault auth failed: " .. (err or (res and res.body) or "unknown"))
          return ngx.exit(403)
        end

        local cjson = require "cjson"
        local data  = cjson.decode(res.body)
        local token = data.auth.client_token

        -- Cache token for 5 minutes
        cache:set(cache_key, token, 300)

        -- Swap Authorization header for X-Vault-Token
        ngx.req.set_header("X-Vault-Token", token)
        ngx.req.clear_header("Authorization")
      }

      # Proxy to Vault
      proxy_pass http://127.0.0.1:8200;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
